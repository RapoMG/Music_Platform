<?xml version="1.0" encoding="UTF-8"?>
<svg
    width="52"
    height="52"
    viewBox="0 0 52 52"
    fill="none"
    xmlns="http://www.w3.org/2000/svg"
>

    <!-- Open circle (symbolizing "Open") -->
    <circle
        cx="24"
        cy="24"
        r="18"
        stroke="#bc86e9"
        stroke-width="2.5"
        stroke-dasharray="100 40"
        stroke-linecap="round"
    />

    <!-- Chord lines -->
    <line x1="16" y1="12" x2="16" y2="36" stroke="#bc86e9" stroke-width="2"/>
    <line x1="22" y1="12" x2="22" y2="36" stroke="#bc86e9" stroke-width="2"/>
    <line x1="28" y1="12" x2="28" y2="36" stroke="#bc86e9" stroke-width="2"/>

    <!-- Chord dots -->
    <circle cx="16" cy="20" r="2.5" fill="#FF7A59"/>
    <circle cx="22" cy="28" r="2.5" fill="#FF7A59"/>
    <circle cx="28" cy="16" r="2.5" fill="#FF7A59"/>

</svg>